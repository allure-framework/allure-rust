name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify workspace
        run: |
          cargo test --workspace --locked
      - name: Publish allure-rust-commons
        run: cargo publish -p allure-rust-commons --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish allure-test-macros
        run: cargo publish -p allure-test-macros --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish allure-cargotest
        run: cargo publish -p allure-cargotest --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
